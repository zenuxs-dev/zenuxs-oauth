<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Login...</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div id="status">
        <div class="spinner"></div>
        <p>Processing authentication...</p>
    </div>

    <script src="https://unpkg.com/zenuxs-oauth"></script>
    <script>
        (async function() {
            try {
                // First, let's see what we have in the URL
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');
                
                console.log('URL Parameters:', { code: !!code, state, error });
                
                if (error) {
                    throw new Error(`OAuth error: ${error} - ${urlParams.get('error_description') || ''}`);
                }
                
                if (!code) {
                    throw new Error('No authorization code found in URL');
                }
                
                // Create OAuth instance with the same config as login page
                const config = {
                    clientId: 'f13975eff3604b2e',
                    redirectUri: window.location.origin + window.location.pathname,
                    scopes: 'openid profile email',
                    debug: true,
                    fetchFunction: window.fetch.bind(window),
                    validateState: false, // Temporarily disable for debugging
                    storage: window.opener ? 'sessionStorage' : 'localStorage' // Use sessionStorage if opened in popup
                };
                
                console.log('Creating OAuth instance with config:', config);
                
                const oauth = new ZenuxOAuth(config);
                
                // Handle the callback
                const tokens = await oauth.handleCallback();
                console.log('Tokens received:', tokens);
                
                // Show success
                document.getElementById('status').innerHTML = `
                    <div class="success">✓ Authentication successful!</div>
                    <p>Redirecting to main app...</p>
                `;
                
                // Store tokens
                localStorage.setItem('zenux_oauth_tokens', JSON.stringify(tokens));
                
                // If opened in popup, send tokens to parent window
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage({
                        type: 'oauth-success',
                        tokens: tokens
                    }, window.location.origin);
                    
                    // Close popup after sending message
                    setTimeout(() => window.close(), 1000);
                } else {
                    // Standard redirect flow
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                }
                
            } catch (error) {
                console.error('Authentication error:', error);
                
                document.getElementById('status').innerHTML = `
                    <div class="error">✗ Authentication failed</div>
                    <p>Error: ${error.message || error}</p>
                    <p>Code: ${error.code || 'Unknown'}</p>
                    <button onclick="window.location.href='/'">Go to Home</button>
                    <button onclick="retryLogin()">Try Again</button>
                `;
                
                // Send error to parent if in popup
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage({
                        type: 'oauth-error',
                        error: error.message || 'Unknown error'
                    }, window.location.origin);
                }
            }
        })();
        
        function retryLogin() {
            // Clear storage and redirect to login
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
